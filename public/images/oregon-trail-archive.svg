<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Oregon Trail Archive art</title>
  <desc id="desc">Archive-style western landscape with wagon trail and sunset.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1c4b"/>
      <stop offset="52%" stop-color="#c46348"/>
      <stop offset="100%" stop-color="#edbf70"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#sky)"/>
  <circle cx="870" cy="180" r="88" fill="#ffd166"/>
  <path d="M0 560 C210 500 410 480 640 530 S1010 620 1200 520 V800 H0Z" fill="#60412e"/>
  <path d="M0 640 C200 600 430 600 650 650 S1040 760 1200 690 V800 H0Z" fill="#2d201d"/>
  <path d="M120 640 C250 610 370 600 520 626" stroke="#f8d39d" stroke-width="10" fill="none"/>
  <g transform="translate(520 500)" fill="#1e1012">
    <rect x="-16" y="10" width="108" height="42" rx="8"/>
    <rect x="-60" y="28" width="54" height="26" rx="8"/>
    <circle cx="-20" cy="72" r="22"/>
    <circle cx="74" cy="72" r="22"/>
  </g>
  <text x="94" y="122" fill="#f8f5ec" font-family="'Georgia', serif" font-size="78" letter-spacing="4">
    OREGON TRAIL ARCHIVE
  </text>
  <text x="100" y="178" fill="#f8e5c2" font-family="Arial, sans-serif" font-size="28" letter-spacing="3">
    A MUSEUM-STYLE EMBED STRAIGHT FROM THE WEB ARCHIVE
  </text>
</svg>
