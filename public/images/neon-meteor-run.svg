    <rect x="-92" y="-8" width="58" height="24" rx="12" fill="#47f5ff"/>
    <rect x="34" y="-8" width="58" height="24" rx="12" fill="#47f5ff"/>
    <rect x="-24" y="54" width="18" height="80" rx="8" fill="#ffd166"/>
