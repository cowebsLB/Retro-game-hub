<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Neon Meteor Run cabinet art</title>
  <desc id="desc">Retro sci-fi arcade poster with neon cyan runner and meteor rain.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#180f43"/>
      <stop offset="55%" stop-color="#0f0c23"/>
      <stop offset="100%" stop-color="#07050f"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3bf5ff"/>
      <stop offset="100%" stop-color="#1f7cff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g opacity="0.45" stroke="#47f5ff">
    <path d="M0 610h1200"/>
    <path d="M0 660h1200"/>
    <path d="M0 710h1200"/>
    <path d="M120 800V430"/>
    <path d="M300 800V430"/>
    <path d="M480 800V430"/>
    <path d="M660 800V430"/>
    <path d="M840 800V430"/>
    <path d="M1020 800V430"/>
  </g>
  <circle cx="960" cy="170" r="110" fill="#ff4fd8" opacity="0.22"/>
  <circle cx="240" cy="150" r="90" fill="#47f5ff" opacity="0.18"/>
  <g fill="#ff4fd8">
    <circle cx="180" cy="220" r="16"/>
    <circle cx="360" cy="280" r="24"/>
    <circle cx="760" cy="180" r="18"/>
    <circle cx="920" cy="280" r="22"/>
